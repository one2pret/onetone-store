# =============================================================================
# .github/workflows/deploy.yml — onetone-store CI/CD
# Branch main       → build tag :latest  → deploy ke testing  (43.133.139.76)
# Branch production → build tag :production → deploy ke production (43.129.40.41)
# =============================================================================

name: Build & Deploy onetone-store

on:
  push:
    branches:
      - main
      - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────
  # JOB 1: BUILD IMAGE
  # Tentukan tag berdasarkan branch, lalu build & push
  # ───────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tentukan tag & URL berdasarkan branch
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "tag=production" >> "$GITHUB_OUTPUT"
            echo "app_url=https://onetone-store.id" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "app_url=https://onetone.kanuraga.web.id" >> "$GITHUB_OUTPUT"
          fi

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=mysql://build:build@localhost:3306/build
            AUTH_SECRET=build_time_dummy
            AUTH_URL=${{ steps.vars.outputs.app_url }}
            NEXT_PUBLIC_APP_URL=${{ steps.vars.outputs.app_url }}
            NEXT_PUBLIC_BASE_URL=${{ steps.vars.outputs.app_url }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_GOOGLE_PICKER_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_PICKER_API_KEY }}
            NEXT_PUBLIC_SEARCH_ENABLED=true

  # ───────────────────────────────────────────────────────
  # JOB 2: DEPLOY TESTING
  # Hanya jalan saat push ke branch main
  # ───────────────────────────────────────────────────────
  deploy-testing:
    name: 🚀 Deploy ke Testing
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout (untuk copy compose file)
        uses: actions/checkout@v4

      - name: Copy compose file ke server testing
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/onetone-store/"

      - name: SSH ke VPS Testing & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/onetone-store

            # Tulis .env — dibaca docker compose untuk MySQL vars
            cat > .env << 'ENVEOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD_TEST }}
            MYSQL_APP_PASSWORD=${{ secrets.MYSQL_APP_PASSWORD_TEST }}
            ENVEOF

            # Tulis .env.app — dibaca container Next.js
            cat > .env.app << 'ENVEOF'
            ${{ secrets.ENV_TEST }}
            ENVEOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  # ───────────────────────────────────────────────────────
  # JOB 3: DEPLOY PRODUCTION
  # Hanya jalan saat push ke branch production
  # ───────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy ke Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/production'

    steps:
      - name: Checkout (untuk copy compose file)
        uses: actions/checkout@v4

      - name: Copy compose file ke server production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST_PROD }}
          username: ${{ secrets.VPS_USER_PROD }}
          key: ${{ secrets.VPS_SSH_KEY_PROD }}
          source: "docker-compose.prod.yml"
          target: "/opt/apps/onetone-store/"

      - name: SSH ke VPS Production & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_PROD }}
          username: ${{ secrets.VPS_USER_PROD }}
          key: ${{ secrets.VPS_SSH_KEY_PROD }}
          script: |
            set -e
            cd /opt/apps/onetone-store

            # Tulis .env — dibaca docker compose untuk MySQL vars
            cat > .env << 'ENVEOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD_PROD }}
            MYSQL_APP_PASSWORD=${{ secrets.MYSQL_APP_PASSWORD_PROD }}
            ENVEOF

            # Tulis .env.app — dibaca container Next.js
            cat > .env.app << 'ENVEOF'
            ${{ secrets.ENV_PROD }}
            ENVEOF

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
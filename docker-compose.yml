version: '3.8'

services:
  onetone-app:
    image: ghcr.io/one2pret/onetone-store:latest
    container_name: onetone-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.app          # ← diubah dari .env ke .env.app
    depends_on:
      onetone-db:
        condition: service_healthy
    networks:
      - onetone-net

  onetone-db:
    image: mysql:8.0
    container_name: onetone-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: onetone_db
      MYSQL_USER: onetone_user
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onetone-net

networks:
  onetone-net:
    driver: bridge

volumes:
  mysql_data: